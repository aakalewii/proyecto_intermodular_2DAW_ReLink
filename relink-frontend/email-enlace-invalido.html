<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace no válido · ReLink</title>
    <link rel="stylesheet" href="src/css/email-verificacion.css">
</head>
<body class="error">
    <div class="card error">
        <div class="logo">ReLink</div>

        <div class="icon-wrap error">
            <svg viewBox="0 0 36 36">
                <line x1="10" y1="10" x2="26" y2="26"/>
                <line x1="26" y1="10" x2="10" y2="26"/>
            </svg>
        </div>

        <div class="badge error">
            <div class="badge-dot"></div>
            Enlace inválido
        </div>

        <h1>Enlace no<br>válido</h1>
        <p>Este enlace de verificación ha expirado o ya no es válido. Solicita uno nuevo desde tu cuenta.</p>

        <div class="divider"></div>

        <a href="login.html" class="btn dark">Ir al inicio de sesión</a>
        <a href="reenviar-verificacion.html" class="btn outline">Reenviar email de verificación</a>

        <p class="footer-note">
            ¿Necesitas ayuda?
            <a href="mailto:soporte@relink.com">soporte@relink.com</a>
        </p>
    </div>
</body>
</html>
