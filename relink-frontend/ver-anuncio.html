<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/components/navBar.css">
    <link rel="stylesheet" href="./src/css/public.css">
    <title>Cargando anuncio... - ReLink</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <div id="navbar-container"></div>

    <main class="container">
        
        <div id="mensaje-estado" style="text-align: center; padding: 50px; font-size: 1.2rem;">
            Cargando los detalles del anuncio...
        </div>

        <div id="contenido-anuncio" class="layout-anuncio" style="display: none;">
            
            <div class="col-fotos">
                <img id="img-principal" src="" alt="Foto principal" class="foto-principal">
                
                <div id="galeria-miniaturas" class="galeria-miniaturas">
                    </div>
            </div>

            <div class="col-info">
                <h1 id="ad-titulo" style="margin-top: 0;">Título del anuncio</h1>
                <div>
                    <span id="ad-categoria" class="etiqueta">Categoría</span>
                    <span> > </span>
                    <span id="ad-subcategoria" class="etiqueta">Subcategoría</span>
                </div>

                <span id="ad-localidad" class="etiqueta"><i class="fa-solid fa-location-dot"></i> Localidad</span>
                <br>
                <p class="precio"><span id="ad-precio">0</span>€</p>
                <h3 style="margin-top: 20px;">Descripción</h3>
                <p id="ad-descripcion" style="line-height: 1.6; color: #555;">Aquí irá la descripción del producto...</p>
                <p style="font-size: 0.8rem; color: #999; text-align: right;">Publicado el: <span id="ad-fecha"></span></p>

                <div class="tarjeta-vendedor">
                    <p style="margin: 0;">Vendedor: <strong><a href="#" id="link-vendedor" class="link-vendedor">Nombre Vendedor</a></strong></p>
                    
                    <button id="btn-contactar" class="btn-primary">
                        <i class="fa-brands fa-whatsapp"></i> Escribir al vendedor
                    </button>
                    
                    <button id="btn-favorito" class="btn-secondary">
                        <i class="fa-regular fa-heart"></i> Guardar en Favoritos
                    </button>
                </div>
            </div>
            
        </div>
    </main>

    <script type="module" src="./src/js/pages/ver-anuncio.js"></script>
</body>
</html>
