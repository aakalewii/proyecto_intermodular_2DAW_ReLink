<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revisa tu email · ReLink</title>
    <link rel="stylesheet" href="src/css/email-verificacion.css">
</head>
<body class="warning">
    <div class="card warning">
        <div class="logo">ReLink</div>

        <div class="icon-wrap warning">
            <svg viewBox="0 0 36 36" fill="none" stroke="#d97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="4" y="10" width="28" height="20" rx="3"/>
                <polyline points="4,10 18,21 32,10"/>
            </svg>
        </div>

        <div class="badge warning">
            <div class="badge-dot"></div>
            Pendiente de verificación
        </div>

        <h1>Revisa tu<br>bandeja</h1>
        <p>Te hemos enviado un email de verificación. Ábrelo y haz clic en el enlace para activar tu cuenta.</p>

        <div class="divider"></div>

        <a href="login.html" class="btn dark">Ya lo verifiqué, iniciar sesión</a>

        <p class="footer-note">
            Revisa también la carpeta de spam. Cualquier duda escribe a
            <a href="mailto:soporte@relink.com">soporte@relink.com</a>
        </p>
    </div>
</body>
</html>
