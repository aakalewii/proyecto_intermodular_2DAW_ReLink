<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Anuncio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <header id="navbar-container"></header>

    <main>
        <h1>Publicar un Nuevo Anuncio</h1>

        <form id="formCrearAnuncio">
            <div>
                <label>Fotos del Anuncio (Opcional):</label>
                <input type="file" id="imagenes" multiple accept="image/jpeg, image/png, image/jpg, image/gif">
            </div>
            <div>
                <label>Título del Anuncio:</label>
                <input type="text" id="titulo" required>
            </div>

            <div>
                <label>Descripción:</label>
                <textarea id="descripcion" required></textarea>
            </div>

            <div>
                <label>Precio (€):</label>
                <input type="number" id="precio" step="0.01" required>
            </div>

            <div>
                <label>Categoría:</label>
                <select id="categoria_id" required>
                    <option value="" disabled selected>Cargando categorías...</option>
                </select>
            </div>

            <div>
                <label>Subcategoría:</label>
                <select id="subcategoria_id" required disabled>
                    <option value="" disabled selected>Selecciona primero una categoría...</option>
                </select>
            </div>

            <div>
                <label>Localidad:</label>
                <select id="localidad_id" required>
                    <option value="" disabled selected>Cargando localidades...</option>
                </select>
            </div>

            <div id="errorMsg" style="color: red; display: none;"></div>
            <div id="successMsg" style="color: green; display: none;">¡Anuncio creado con éxito!</div>
            
            <button type="submit">Publicar Anuncio</button>
        </form>
    </main>

    <script type="module" src="/src/js/pages/crear-anuncio.js"></script>
</body>
</html>
