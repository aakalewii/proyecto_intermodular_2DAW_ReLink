<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Anuncio - ReLink</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./src/css/public.css">
    <link rel="stylesheet" href="/src/css/components/navBar.css">
</head>
<body>

    <header id="navbar-container"></header>

    <main>
        <div style="text-align: center;">
            <h1 class="page-title">Publicar un Nuevo Anuncio</h1>
        </div>

        <form id="formCrearAnuncio" class="formulario-publico">
            
            <div class="form-group">
                <label><i class="fa-solid fa-camera"></i> Fotos del Anuncio (Opcional):</label>
                <input type="file" id="imagenes" multiple accept="image/jpeg, image/png, image/jpg, image/gif" style="padding: 10px; background: #f8f9fa; border: 1px dashed #ced4da;">
            </div>
            
            <div class="form-group">
                <label>Título del Anuncio:</label>
                <input type="text" id="titulo" placeholder="Ej: Sofá de tres plazas casi nuevo" required>
            </div>

            <div class="form-group">
                <label>Descripción:</label>
                <textarea id="descripcion" rows="4" placeholder="Describe los detalles, estado, medidas..." required></textarea>
            </div>

            <div class="form-group">
                <label>Precio (€):</label>
                <input type="number" id="precio" step="0.01" placeholder="0.00" required>
            </div>

            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex: 1;">
                    <label>Categoría:</label>
                    <select id="categoria_id" required>
                        <option value="" disabled selected>Cargando categorías...</option>
                    </select>
                </div>

                <div class="form-group" style="flex: 1;">
                    <label>Subcategoría:</label>
                    <select id="subcategoria_id" required disabled>
                        <option value="" disabled selected>Selecciona primero una categoría</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Localidad:</label>
                <select id="localidad_id" required>
                    <option value="" disabled selected>Cargando localidades...</option>
                </select>
            </div>

            <div id="errorMsg" style="color: #dc3545; background: #f8d7da; padding: 10px; border-radius: 6px; display: none; margin-bottom: 15px;"></div>
            <div id="successMsg" style="color: #28a745; background: #d4edda; padding: 10px; border-radius: 6px; display: none; margin-bottom: 15px;">¡Anuncio creado con éxito!</div>
            
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px; padding: 15px; font-size: 1.2rem;">
                <i class="fa-solid fa-paper-plane"></i> Publicar Anuncio
            </button>
        </form>
    </main>

    <script type="module" src="/src/js/pages/crear-anuncio.js"></script>
</body>
</html>
