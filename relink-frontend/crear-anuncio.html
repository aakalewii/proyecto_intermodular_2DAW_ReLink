<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publicar Anuncio | ReLink</title>
</head>
<body>

    <header id="navbar-container"></header>

    <main>
        <hr>

        <form id="formCrearAnuncio" enctype="multipart/form-data">
            
            <div id="errorMsg"></div>
            <div id="successMsg">¡Anuncio creado con éxito! Redirigiendo...</div>

            <div class="form-group">
                <label for="titulo">Título del Anuncio:</label>
                <input type="text" id="titulo" placeholder="Ej: Bicicleta de montaña casi nueva" required>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción detallada:</label>
                <textarea id="descripcion" placeholder="Describe el estado, características..." required></textarea>
            </div>

            <div class="form-group">
                <label for="precio">Precio (€):</label>
                <input type="number" id="precio" step="0.01" min="0" placeholder="0.00" required>
            </div>

            <div class="form-group">
                <label for="categoria_id">Categoría:</label>
                <select id="categoria_id" required>
                    <option value="" disabled selected>Cargando categorías...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="subcategoria_id">Subcategoría:</label>
                <select id="subcategoria_id" required disabled>
                    <option value="" disabled selected>Selecciona primero una categoría</option>
                </select>
            </div>

            <div class="form-group">
                <label for="localidad_id">Localidad:</label>
                <select id="localidad_id" required>
                    <option value="" disabled selected>Cargando localidades...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="imagenes"><i class="fa-solid fa-camera"></i> Subir Imágenes (Máximo 5):</label>
                <input type="file" id="imagenes" name="imagenes[]" accept="image/*" multiple>
                <small>Puedes seleccionar varias fotos a la vez.</small>
            </div>

            <button type="submit" id="btnPublicar">Publicar Anuncio</button>
        </form>
    </main>

    <script type="module" src="/src/js/pages/crear-anuncio.js"></script>
</body>
</html>
