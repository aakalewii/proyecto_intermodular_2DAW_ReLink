<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - ReLink</title>
    <link rel="stylesheet" href="/src/css/components/navBar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./src/css/public.css">
</head>
<body>
    <header id="navbar-container"></header>

    <main>
        <h1 class="page-title">Mi Perfil</h1>

        <section class="seccion-perfil">
            <h2>Datos personales</h2>

            <div id="bloque-lectura">
                <p class="perfil-dato"><strong>Nombre completo:</strong> <span id="perf-nombre">Cargando...</span></p>
                <p class="perfil-dato"><strong>Email:</strong> <span id="perf-email">Cargando...</span></p>
                <p class="perfil-dato"><strong>Teléfono:</strong> <span id="perf-telefono">Cargando...</span></p>
                <p class="perfil-dato"><strong>Localidad:</strong> <span id="perf-localidad">Cargando...</span></p>

                <button id="btn-editar" class="btn-secondary" style="width: auto; margin-top: 8px;">
                    <i class="fa-solid fa-pen"></i> Editar perfil
                </button>
            </div>

            <form id="form-editar" class="formulario-publico" style="display: none; padding: 0; border: none; max-width: 400px;">

                <div class="form-group">
                    <label>Nombre:</label>
                    <input type="text" id="edit-nombre" required>
                </div>

                <div class="form-group">
                    <label>Apellidos:</label>
                    <input type="text" id="edit-apellidos">
                </div>

                <div class="form-group">
                    <label>Teléfono:</label>
                    <input type="text" id="edit-telefono">
                </div>

                <div class="form-group">
                    <label>Localidad:</label>
                    <select id="edit-localidad">
                        <option value="">Cargando localidades...</option>
                    </select>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 4px;">
                    <button type="submit" class="btn-primary" style="width: auto; padding: 10px 20px;">
                        <i class="fa-solid fa-floppy-disk"></i> Guardar
                    </button>
                    <button type="button" id="btn-cancelar" class="btn-secondary" style="width: auto; padding: 10px 20px;">
                        Cancelar
                    </button>
                </div>

            </form>
        </section>

        <section class="seccion-perfil">
            <h2>Mis anuncios publicados</h2>
            <div id="mis-anuncios-lista" class="lista-anuncios-perfil">
                <p class="texto-vacio">Cargando anuncios...</p>
            </div>
        </section>

    </main>

    <script type="module" src="/src/js/pages/perfil.js"></script>
</body>
</html>
