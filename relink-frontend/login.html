<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/components/navbar.css">
    <link rel="stylesheet" href="./src/css/auth.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <title>Iniciar Sesión - ReLink</title>
</head>
<body>

    <header id="navbar-container"></header>

    <div class="auth-wrapper">
        
        <div class="auth-container">

            <div class="auth-logo" style="text-align: center; margin-bottom: 20px;">
                <img src="./src/assets/LogoReLink.png" alt="Logo ReLink" id="main-logo" style="width: 220px; height: auto;">
            </div>

            <h1>Bienvenido de nuevo a ReLink</h1>
            
            <form id="loginForm">
                <div>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="g-recaptcha" data-sitekey="6Le-1ZQsAAAAAPwYeP8L6UvTRBVy4IqVi9-eeKNh"></div>

                <div id="errorMessage" style="display: none;"></div>
                
                <button type="submit">Entrar</button>
            </form>
            
            <p class="auth-links">¿No tienes cuenta? <a href="./register.html">Regístrate aquí</a></p>
        </div>

    </div>

    <script type="module" src="./src/js/pages/login.js"></script>
    <script type="module" src="./src/js/components/navBar.js"></script>

</body>
</html>
