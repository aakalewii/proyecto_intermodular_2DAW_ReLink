<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil del Vendedor - ReLink</title>
    <link rel="stylesheet" href="/src/css/components/navBar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./src/css/public.css">
</head>
<body>
    <header id="navbar-container"></header>

    <main>
        <div id="mensaje-estado" style="text-align: center; padding: 40px; font-size: 1.2rem;">
            Cargando perfil del vendedor...
        </div>

        <div id="contenido-vendedor" style="display: none;">
            
            <h1 class="page-title">Perfil del Vendedor</h1>

            <div style="display: flex; align-items: center; gap: 30px; flex-wrap: wrap;">
                <div id="bloque-foto-vendedor"></div>
            </div>

            <section class="seccion-perfil">
                <h2>Información de contacto</h2>

                <div id="bloque-lectura">
                    <p class="perfil-dato"><strong>Nombre:</strong> <span id="vend-nombre">Cargando...</span></p>
                    <p class="perfil-dato"><strong>Teléfono:</strong> <span id="vend-telefono">Cargando...</span></p>
                    <p class="perfil-dato"><strong>Localidad:</strong> <span id="vend-localidad">Cargando...</span></p>
                </div>
            </section>

            <section class="seccion-perfil">
                <h2>Anuncios de este vendedor</h2>
                
                <div id="anuncios-vendedor-lista" class="lista-anuncios-perfil">
                    <p class="texto-vacio">Cargando anuncios...</p>
                </div>
            </section>

        </div>
    </main>

    <script type="module" src="/src/js/pages/ver-vendedor.js"></script>
</body>
</html>
