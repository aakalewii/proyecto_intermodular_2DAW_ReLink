<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReLink - Inicio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./src/css/components/navBar.css">
    <link rel="stylesheet" href="./src/css/public.css">
</head>
<body>

    <header id="navbar-container"></header>

    <div class="layout-container">
        <aside class="filters-sidebar">
            <h2><i class="fa-solid fa-sliders"></i> ReLink Swipe</h2>
            
            <form id="form-filtros-swipe">
                <div class="filter-group">
                    <label>Categoría</label>
                    <select id="select-categoria">
                        <option value="">Todas las categorías</option>
                        </select>
                </div>

                <div class="filter-group">
                    <label>Subcategoría</label>
                    <select id="select-subcategoria" disabled>
                        <option value="">Selecciona categoría primero</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Ubicación (Localidad)</label>
                    <select id="select-municipio">
                        <option value="">Toda España</option>
                        </select>
                </div>

                <div class="filter-group">
                    <label>Rango de Precio (€)</label>
                    <div class="price-inputs">
                        <input type="number" id="precio-min" placeholder="Min">
                        <input type="number" id="precio-max" placeholder="Max">
                    </div>
                </div>

                <button type="submit" class="btn-buscar-swipe">
                    SWIPE <i class="fa-solid fa-bolt"></i>
                </button>
            </form>
        </aside>

        <main class="main-content">
            <h1 id="titulo-seccion">Últimos Anuncios</h1>
            <div id="lista-anuncios"></div>

            <div id="contenedor-swipe" style="display: none;">
                <div class="swipe-card">
                    <div class="swipe-header">
                        <img id="swipe-img-principal" src="" class="swipe-img-main">
                    </div>
                    
                    <div class="swipe-right">
                        <div class="swipe-body">
                            <h2 id="swipe-titulo"></h2>
                            <h3 id="swipe-precio"></h3>
                            <p id="swipe-localidad"></p>
                            <p id="swipe-descripcion"></p>
                        </div>

                        <div class="swipe-footer">
                            <button id="btn-swipe-dislike" class="btn-swipe action-dislike"><i class="fa-solid fa-xmark"></i></button>
                            <button id="btn-swipe-wa" class="btn-swipe action-wa"><i class="fa-brands fa-whatsapp"></i></button>
                            <button id="btn-swipe-like" class="btn-swipe action-like"><i class="fa-solid fa-heart"></i></button>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script type="module" src="./src/js/pages/main.js"></script>
</body>
</html>
